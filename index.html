<body class="bg-slate-100 p-4"><div class="max-w-3xl mx-auto bg-white rounded-2xl shadow p-6"><h1 class="text-3xl font-bold text-indigo-600">🔷 Turso (libSQL) Proxy</h1><p class="text-slate-500 mt-1">Edge‑hosted SQLite via Turso.</p><hr class="my-4"><h2 class="text-xl font-semibold">📡 Endpoint</h2><div><code class="bg-slate-200 px-2 py-1 rounded">POST /api/turso</code><p>Body: <code>{"sql":"SELECT * FROM users WHERE id = ?", "args":[1]}</code></p><p>Returns rows as JSON.</p></div><hr class="my-4"><h2 class="text-xl font-semibold">🔑 Authentication</h2><p>Requires <code>X-API-Key</code> header.</p><p class="mt-2">👉 <a href="/turso-proxy.html" class="text-blue-600 underline">Open interactive tester →</a></p></div></body></html>
